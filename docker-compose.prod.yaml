services:
  prompt-optimiser:
    image: ghcr.io/aut0nate/prompt-optimiser:${IMAGE_TAG:-latest}
    container_name: prompt-optimiser
    restart: unless-stopped
    env_file:
      - .env
    environment:
      HOST: 0.0.0.0
      PORT: 3000
    expose:
      - "3000"
    networks:
      - mgmt-net

networks:
  mgmt-net:
    external: true
