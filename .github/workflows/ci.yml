name: CI - Validate and build

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  CI_IMAGE_TAG: prompt-optimiser:ci

jobs:
  lint-build-and-smoke-test:
    name: Lint, build and smoke test Docker image
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run linting
        run: npm run lint

      - name: Build application
        run: npm run build

      - name: Audit production dependencies
        run: npm audit --omit=dev

      - name: Build Docker image
        run: docker build -t "${CI_IMAGE_TAG}" .

      - name: Smoke test Docker image
        run: |
          set -euo pipefail

          docker run --detach --name prompt-optimiser-smoke \
            --env HOST=0.0.0.0 \
            --env PORT=3000 \
            --publish 3000:3000 \
            "${CI_IMAGE_TAG}"

          for attempt in {1..30}; do
            if curl --fail --silent --show-error http://127.0.0.1:3000/ >/dev/null; then
              docker logs prompt-optimiser-smoke
              exit 0
            fi
            sleep 2
          done

          docker logs prompt-optimiser-smoke
          exit 1

      - name: Stop smoke test container
        if: always()
        run: docker rm --force prompt-optimiser-smoke || true
